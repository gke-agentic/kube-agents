kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: nginx-web
  namespace: "nginx"
  labels:
    app.kubernetes.io/instance: nginx-web
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: nginx
    app.kubernetes.io/version: 1.31.2
    helm.sh/chart: nginx-25.0.11
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: nginx-web
      app.kubernetes.io/name: nginx
  policyTypes:
    - Ingress
    - Egress
  egress:
    - {}
  ingress:
    - ports:
        - port: 8080
        - port: 8443
