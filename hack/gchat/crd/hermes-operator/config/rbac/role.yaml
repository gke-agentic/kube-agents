---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - agent.hermes.io
  resources:
  - hermesagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent.hermes.io
  resources:
  - hermesagents/finalizers
  verbs:
  - update
- apiGroups:
  - agent.hermes.io
  resources:
  - hermesagents/status
  verbs:
  - get
  - patch
  - update
