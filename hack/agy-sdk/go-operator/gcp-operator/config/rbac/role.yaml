---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - batch
  resources:
  - cronjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs/status
  verbs:
  - get
- apiGroups:
  - batch.mycompany.com
  resources:
  - myowncronjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.mycompany.com
  resources:
  - myowncronjobs/finalizers
  verbs:
  - update
- apiGroups:
  - batch.mycompany.com
  resources:
  - myowncronjobs/status
  verbs:
  - get
  - patch
  - update
