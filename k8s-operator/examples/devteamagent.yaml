apiVersion: kubeagents.x-k8s.io/v1alpha1
kind: DevTeamAgent
metadata:
  name: devteam-agent-autopilot-cluster-1-us-central1-devteam-app-ns
  namespace: kubeagents-system
spec:
  harness:
    clusterName: "autopilot-cluster-1"
    location: "us-central1"
    projectId: "kube-agents-gkedemos"
    namespace: "devteam-app-ns"
    hermes:
      apiServerSecretRef:
        name: "platform-agent-secrets"
        key: "API_SERVER_KEY"
  deployment:
    image: "us-central1-docker.pkg.dev/kube-agents-gkedemos/kubeagents-operator-repo/devteam-agent"
    tag: "latest"
  security:
    serviceAccountName: "kubeagents-devteam-agent"
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: "kubeagents-devteam-gsa@kube-agents-gkedemos.iam.gserviceaccount.com"
    remoteIdentitySubject: "kubeagents-devteam-gsa@kube-agents-gkedemos.iam.gserviceaccount.com"
