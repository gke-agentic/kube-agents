apiVersion: kubeagents.x-k8s.io/v1alpha1
kind: DevTeamAgent
metadata:
  name: devteam-agent-ac-3-us-central1-devteam-app-ns
  namespace: kubeagents-system
spec:
  harness:
    clusterName: "ac-3"
    location: "us-central1"
    projectId: "kube-agents-gke"
    namespace: "devteam-app-ns"
    hermes:
      apiServerSecretRef:
        name: "platform-agent-secrets"
        key: "API_SERVER_KEY"
  deployment:
    image: "us-central1-docker.pkg.dev/kube-agents-gke/kubeagents-operator-repo/devteam-agent"
    tag: "latest"
  security:
    serviceAccountName: "devteam-agent-ac-3-devteam-app-ns"
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: "dt-gsa-ac-3@kube-agents-gke.iam.gserviceaccount.com"
    remoteIdentitySubject: "dt-gsa-ac-3@kube-agents-gke.iam.gserviceaccount.com"
