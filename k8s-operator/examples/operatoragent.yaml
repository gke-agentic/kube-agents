apiVersion: kubeagents.x-k8s.io/v1alpha1
kind: OperatorAgent
metadata:
  name: operator-agent-autopilot-cluster-1-us-central1
  namespace: kubeagents-system
spec:
  harness:
    clusterName: "autopilot-cluster-1"
    location: "us-central1"
    hermes:
      apiServerSecretRef:
        name: "platform-agent-secrets"
        key: "API_SERVER_KEY"
  deployment:
    image: "us-central1-docker.pkg.dev/kube-agents-gke/kubeagents-operator-repo/operator-agent"
    tag: "latest"
  security:
    serviceAccountName: "operator-agent"
    workloadIdentity:
      gcp:
        gsaName: "operator-agent-gsa"
        projectId: "kube-agents-gke"
  model:
    provider: "gemini"
    default: "gemini-3.1-flash-lite"
    gemini:
      apiKeySecretRef:
        name: "platform-agent-secrets"
        key: "GEMINI_API_KEY"
