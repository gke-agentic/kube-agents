---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /mutate-kubeagents-x-k8s-io-v1alpha1-kubeagent
    failurePolicy: Fail
    name: mkubeagent.kb.io
    rules:
      - apiGroups:
          - kubeagents.x-k8s.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - kubeagents
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-kubeagents-x-k8s-io-v1alpha1-kubeagent
    failurePolicy: Fail
    name: vkubeagent.kb.io
    rules:
      - apiGroups:
          - kubeagents.x-k8s.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - kubeagents
    sideEffects: None
