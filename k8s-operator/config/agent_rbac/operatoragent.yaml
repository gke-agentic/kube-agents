apiVersion: v1
kind: ServiceAccount
metadata:
  name: operator-agent
  namespace: kubeagents-system
---
# ── Least-Privilege Cluster-Wide K8s RBAC Roles for Operator Agent ─────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-agent-cluster-role
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - events
      - persistentvolumes
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operator-agent-cluster-rolebinding
subjects:
  - kind: ServiceAccount
    name: operator-agent
    namespace: kubeagents-system
roleRef:
  kind: ClusterRole
  name: operator-agent-cluster-role
  apiGroup: rbac.authorization.k8s.io
