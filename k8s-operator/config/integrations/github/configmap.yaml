apiVersion: v1
kind: ConfigMap
metadata:
  name: github-token-minter-config
  namespace: ${NAMESPACE}
data:
  ${GITHUB_ORG}-${GITHUB_REPO}.yaml: |
    version: 'minty.abcxyz.dev/v2'
    rule:
      if: "assertion.iss == 'https://accounts.google.com'"
    scope:
      platform-agent-scope:
        rule:
          if: "assertion.email == '${PLATFORM_AGENT_GSA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com'"
        repositories:
          - '${GITHUB_REPO}'
        permissions:
          contents: 'write'
          pull_requests: 'write'
