name: Staging Redeploy Controller

on:
  push:
    tags:
      - 'staging/**'

concurrency:
  group: staging-redeploy-controller
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  call-deploy:
    # DBG TEST: Commenting out repo guard so it runs on fork
    # if: github.repository == 'gke-labs/kube-agents'
    uses: ./.github/workflows/reusable-deploy-controller.yml
    with:
      # DBG TEST: Hardcoded values for testing
      # target_environment: 'staging'
      # controller_tag: ${{ github.sha }}
      target_environment: 'kkosov-dev'
      controller_tag: '193c92e45ca2159df10958f6937f8c6154c855a4'
      checkout_ref: ${{ github.ref }}
