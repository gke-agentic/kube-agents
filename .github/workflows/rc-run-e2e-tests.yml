name: RC Step 3 - Run E2E Tests

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        # TODO(POC): Temporary commit SHA input fallback for manual test execution.
        description: "Git Commit SHA (Default: 1810fac241a9540f943e9722c38ab45135905e06)"
        required: false
        default: "1810fac241a9540f943e9722c38ab45135905e06"
        type: string
      rc_tag:
        description: "Release Candidate Tag (Mandatory for Step 3 standalone launch)"
        required: false
        type: string
  workflow_call:
    inputs:
      commit_sha:
        required: false
        type: string
      rc_tag:
        required: false
        type: string

jobs:
  run-e2e-tests:
    name: 🧪 Run E2E Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # TODO(POC): Inlined test execution steps directly here because GitHub Actions strictly forbids nesting reusable workflows (Caller -> rc-run-e2e-tests -> e2e-gchat-test causes startup_failure).
      # Note: Step 2 Deployment didn't hit this issue because deployment runs bash scripts (provision.sh) directly rather than invoking a nested workflow file.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # TODO(POC): Temporary target commit fallback 1810fac241a9540f943e9722c38ab45135905e06. Replace with github.sha before main.
          ref: ${{ inputs.commit_sha || '1810fac241a9540f943e9722c38ab45135905e06' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/e2e/requirements.txt

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER || 'projects/1020703904916/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider' }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL || 'github-actions-e2e@kube-agents-rc.iam.gserviceaccount.com' }}

      - name: Execute E2E Test
        env:
          GCP_PROJECT_ID: "kube-agents-rc"
          CHAT_TOPIC_NAME: "platform-agent-chat-events"
          TEST_USER_EMAIL: "github-actions-e2e@kube-agents-rc.iam.gserviceaccount.com"
          TEST_TIMEOUT_SEC: "120"
          E2E_CHAT_CLIENT_ID: ${{ secrets.E2E_CHAT_CLIENT_ID }}
          E2E_CHAT_CLIENT_SECRET: ${{ secrets.E2E_CHAT_CLIENT_SECRET }}
          E2E_CHAT_REFRESH_TOKEN: ${{ secrets.E2E_CHAT_REFRESH_TOKEN }}
        run: |
          pytest tests/e2e/gchat_agent_test.py -v -s
