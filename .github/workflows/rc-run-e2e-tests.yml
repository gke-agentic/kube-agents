name: RC Step 3 - Run E2E Tests

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        # TODO(POC): Temporary commit SHA input fallback for manual test execution.
        description: "Git Commit SHA (Default: 1810fac241a9540f943e9722c38ab45135905e06)"
        required: false
        default: "1810fac241a9540f943e9722c38ab45135905e06"
        type: string
      rc_tag:
        description: "Release Candidate Tag (Mandatory for Step 3 standalone launch)"
        required: false
        type: string
  workflow_call:
    inputs:
      commit_sha:
        required: false
        type: string
      rc_tag:
        required: false
        type: string

jobs:
  run-e2e-tests:
    name: 🧪 Run E2E Test Suite via Reusable Workflow
    uses: ./.github/workflows/e2e-gchat-test.yml
    with:
      gcp_project_id: "kube-agents-rc"
      chat_topic_name: "platform-agent-chat-events"
    secrets: inherit
