name: Autopush E2E Pipeline

on:
  push:
    branches:
      - "feature/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  autopush-validation:
    name: Autopush Validation & Labeling
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/e2e/requirements.txt

      - name: 🔍 Check Candidate Artifacts Sync Status
        id: check_sync
        env:
          REGISTRY: "ghcr.io"
          OWNER: "${{ github.repository }}"
          IMAGES: "platform-agent"
        run: |
          chmod +x tests/e2e/scripts/check_candidate_artifacts.sh
          tests/e2e/scripts/check_candidate_artifacts.sh

      - name: 🔐 Authenticate to Google Cloud via WIF
        if: steps.check_sync.outputs.needs_validation == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || '' }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER || 'projects/1020703904916/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider' }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL || 'github-actions-e2e@kube-agents-autopush.iam.gserviceaccount.com' }}

      - name: 🧪 Execute Google Chat E2E Sanity Test
        if: steps.check_sync.outputs.needs_validation == 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'kube-agents-autopush' }}
          CHAT_SPACE_ID: ${{ secrets.E2E_CHAT_SPACE_ID }}
          E2E_CHAT_CLIENT_ID: ${{ secrets.E2E_CHAT_CLIENT_ID }}
          E2E_CHAT_CLIENT_SECRET: ${{ secrets.E2E_CHAT_CLIENT_SECRET }}
          E2E_CHAT_REFRESH_TOKEN: ${{ secrets.E2E_CHAT_REFRESH_TOKEN }}
        run: |
          pytest tests/e2e/gchat_agent_test.py -v -s

      - name: 🏷️ Label Verified Artifacts as Stable in GHCR
        if: steps.check_sync.outputs.needs_validation == 'true'
        env:
          REGISTRY: "ghcr.io"
          OWNER: "${{ github.repository }}"
          IMAGES: "platform-agent"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          chmod +x tests/e2e/scripts/label_stable_artifacts.sh
          tests/e2e/scripts/label_stable_artifacts.sh
