name: Autopush E2E Pipeline

on:
  push:
    branches:
      - "feature/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  check-candidate-sync:
    name: 🔍 Check Candidate Sync Status
    runs-on: ubuntu-latest
    outputs:
      needs_validation: ${{ steps.check_sync.outputs.needs_validation }}
      platform_agent_sha: ${{ steps.check_sync.outputs.platform_agent_sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Check Candidate Artifacts Sync Status
        id: check_sync
        env:
          REGISTRY: "ghcr.io"
          OWNER: "${{ github.repository }}"
          IMAGES: "platform-agent"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x tests/e2e/scripts/check_candidate_artifacts.sh
          tests/e2e/scripts/check_candidate_artifacts.sh

  run-e2e-test:
    name: 🧪 Run E2E Test Suite
    needs: check-candidate-sync
    if: needs.check-candidate-sync.outputs.needs_validation == 'true'
    uses: ./.github/workflows/e2e-gchat-test.yml
    secrets: inherit

  label-stable-artifacts:
    name: 🏷️ Label Stable Artifacts
    needs: [check-candidate-sync, run-e2e-test]
    if: needs.check-candidate-sync.outputs.needs_validation == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Label Verified Artifacts as Stable in GHCR
        env:
          REGISTRY: "ghcr.io"
          OWNER: "${{ github.repository }}"
          IMAGES: "platform-agent"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x tests/e2e/scripts/label_stable_artifacts.sh
          tests/e2e/scripts/label_stable_artifacts.sh
