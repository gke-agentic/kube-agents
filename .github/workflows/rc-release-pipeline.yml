name: RC Master Release Pipeline

on:
  push:
    branches:
      # TODO(POC): Temporary branch push trigger for POC testing on test/autopush-poc-pipeline. Remove before merging to main.
      - "test/autopush-poc-pipeline"
    tags:
      - "rc_*"
  pull_request:
    # TODO(POC): Temporary PR trigger for POC testing. Remove before merging to main.
    branches:
      - "*"
  workflow_dispatch:
    inputs:
      commit_sha:
        # TODO(POC): Temporary default commit SHA for POC testing (1810fac241a9540f943e9722c38ab45135905e06). Remove before merging to main.
        description: "Git Commit SHA (Default: 1810fac241a9540f943e9722c38ab45135905e06)"
        required: false
        default: "1810fac241a9540f943e9722c38ab45135905e06"
        type: string
      rc_tag:
        # TODO(POC): Temporary RC tag auto-generation fallback for manual release candidate testing.
        description: "Release Candidate Tag (Default: Auto-generated rc_YYMMDDHHMM)"
        required: false
        type: string
      start_from_step:
        # TODO(POC): Choice parameter to trigger master pipeline from a specific step during debugging. Remove before merging to main.
        description: "Start pipeline from step"
        type: choice
        options:
          - "step1_create_tag"
          - "step2_deploy"
          - "step3_test"
          - "step4_validate"
        default: "step1_create_tag"

jobs:
  step1-create-tag:
    name: 🏷️ Step 1 - Create Candidate Tag
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.start_from_step == '' || github.event.inputs.start_from_step == 'step1_create_tag'
    # TODO(POC): Temporary branch reference @test/autopush-poc-pipeline for unmerged POC reusable workflow resolution. Revert to ./.github/workflows/rc-create-tag.yml before main.
    uses: gke-agentic/kube-agents/.github/workflows/rc-create-tag.yml@test/autopush-poc-pipeline
    with:
      # TODO(POC): Temporary hardcoded commit fallback 1810fac241a9540f943e9722c38ab45135905e06. Replace with github.sha before main.
      commit_sha: ${{ github.event.inputs.commit_sha || '1810fac241a9540f943e9722c38ab45135905e06' }}
      rc_tag: ${{ github.event.inputs.rc_tag || '' }}
    secrets: inherit

  step2-deploy:
    name: 🚀 Step 2 - Deploy Environment
    needs: [step1-create-tag]
    if: always() && (needs.step1-create-tag.result == 'success' || github.event.inputs.start_from_step == 'step2_deploy')
    # TODO(POC): Temporary branch reference @test/autopush-poc-pipeline for unmerged POC reusable workflow resolution. Revert to ./.github/workflows/rc-deploy-environment.yml before main.
    uses: gke-agentic/kube-agents/.github/workflows/rc-deploy-environment.yml@test/autopush-poc-pipeline
    with:
      # TODO(POC): Temporary hardcoded commit fallback 1810fac241a9540f943e9722c38ab45135905e06. Replace with github.sha before main.
      commit_sha: ${{ needs.step1-create-tag.outputs.resolved_commit_sha || github.event.inputs.commit_sha || '1810fac241a9540f943e9722c38ab45135905e06' }}
      rc_tag: ${{ needs.step1-create-tag.outputs.resolved_rc_tag || github.event.inputs.rc_tag || '' }}
    secrets: inherit

  step3-test:
    name: 🧪 Step 3 - Run E2E Tests
    needs: [step1-create-tag, step2-deploy]
    if: always() && (needs.step2-deploy.result == 'success' || github.event.inputs.start_from_step == 'step3_test')
    # TODO(POC): Temporary branch reference @test/autopush-poc-pipeline for unmerged POC reusable workflow resolution. Revert to ./.github/workflows/rc-run-e2e-tests.yml before main.
    uses: gke-agentic/kube-agents/.github/workflows/rc-run-e2e-tests.yml@test/autopush-poc-pipeline
    with:
      # TODO(POC): Temporary hardcoded commit fallback 1810fac241a9540f943e9722c38ab45135905e06. Replace with github.sha before main.
      commit_sha: ${{ needs.step1-create-tag.outputs.resolved_commit_sha || github.event.inputs.commit_sha || '1810fac241a9540f943e9722c38ab45135905e06' }}
      rc_tag: ${{ needs.step1-create-tag.outputs.resolved_rc_tag || github.event.inputs.rc_tag || '' }}
    secrets: inherit

  step4-validate:
    name: ✅ Step 4 - Validate Candidate
    needs: [step1-create-tag, step3-test]
    if: always() && (needs.step3-test.result == 'success' || github.event.inputs.start_from_step == 'step4_validate')
    # TODO(POC): Temporary branch reference @test/autopush-poc-pipeline for unmerged POC reusable workflow resolution. Revert to ./.github/workflows/rc-tag-validated.yml before main.
    uses: gke-agentic/kube-agents/.github/workflows/rc-tag-validated.yml@test/autopush-poc-pipeline
    with:
      # TODO(POC): Temporary hardcoded commit fallback 1810fac241a9540f943e9722c38ab45135905e06. Replace with github.sha before main.
      commit_sha: ${{ needs.step1-create-tag.outputs.resolved_commit_sha || github.event.inputs.commit_sha || '1810fac241a9540f943e9722c38ab45135905e06' }}
      rc_tag: ${{ needs.step1-create-tag.outputs.resolved_rc_tag || github.event.inputs.rc_tag || '' }}
    secrets: inherit
