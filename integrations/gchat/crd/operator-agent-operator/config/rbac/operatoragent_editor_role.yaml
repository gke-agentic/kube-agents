# This rule is not used by the project operator-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the operator.platform.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: operatoragent-editor-role
rules:
- apiGroups:
  - operator.platform.io
  resources:
  - operatoragents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.platform.io
  resources:
  - operatoragents/status
  verbs:
  - get
