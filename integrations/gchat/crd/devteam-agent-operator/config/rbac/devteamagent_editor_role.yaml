# This rule is not used by the project devteam-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the devteam.platform.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: devteam-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: devteamagent-editor-role
rules:
- apiGroups:
  - devteam.platform.io
  resources:
  - devteamagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - devteam.platform.io
  resources:
  - devteamagents/status
  verbs:
  - get
