# This rule is not used by the project devteam-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over devteam.platform.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: devteam-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: devteamagent-admin-role
rules:
- apiGroups:
  - devteam.platform.io
  resources:
  - devteamagents
  verbs:
  - '*'
- apiGroups:
  - devteam.platform.io
  resources:
  - devteamagents/status
  verbs:
  - get
