# This rule is not used by the project devteam-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to devteam.platform.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: devteam-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: devteamagent-viewer-role
rules:
- apiGroups:
  - devteam.platform.io
  resources:
  - devteamagents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - devteam.platform.io
  resources:
  - devteamagents/status
  verbs:
  - get
