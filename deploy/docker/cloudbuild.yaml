steps:
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - "docker pull $_IMAGE_URI_LATEST || true"
  - name: "gcr.io/cloud-builders/docker"
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      - "build"
      - "-t"
      - "$_IMAGE_URI"
      - "-t"
      - "$_IMAGE_URI_LATEST"
      - "--cache-from"
      - "$_IMAGE_URI_LATEST"
      - "-f"
      - "deploy/docker/Dockerfile"
      - "--target"
      - "$_TARGET"
      - "--build-arg"
      - "BUILDKIT_INLINE_CACHE=1"
      - "--build-arg"
      - "OPENCLAW_COMMIT=$_OPENCLAW_COMMIT"
      - "."
images:
  - "$_IMAGE_URI"
  - "$_IMAGE_URI_LATEST"
substitutions:
  _IMAGE_URI: ""
  _IMAGE_URI_LATEST: ""
  _TARGET: ""
  _OPENCLAW_COMMIT: "86e9dcfc1b051b8b0993850e21a37359ff2626ac"
