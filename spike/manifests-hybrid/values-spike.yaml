# ==============================================================================
# 🤖 kagent Helm Values for Isolated Spike
# ==============================================================================
# Disables default agents and MCP tools to minimize resource usage.
# ==============================================================================

# Disable all default agents
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
istio-agent:
  enabled: false
promql-agent:
  enabled: false
observability-agent:
  enabled: false
argo-rollouts-agent:
  enabled: false
helm-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-debug-agent:
  enabled: false

# Disable default MCP tools
grafana-mcp:
  enabled: false
querydoc:
  enabled: false
